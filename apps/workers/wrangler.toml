name = "energy-monitor-workers"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["* * * * *"] # 毎分: データ収集
# crons = ["0 0 * * *"]     # 毎日0時: 日次CSV → R2

[[d1_databases]]
binding = "DB"
database_name = "energy-db"
database_id = "cd726043-02c4-4cae-bc1b-726c382f2442"

[[r2_buckets]]
binding = "R2"
bucket_name = "energy-reports"

[vars]
COST_PER_KWH = "30"
ALERT_THRESHOLD_WATTS = "3000"
# ALLOWED_ORIGINS: カンマ区切りで許可するオリジンを設定
# 例: "https://energy-monitor.pages.dev,http://localhost:5173"
ALLOWED_ORIGINS = ""
# API_KEY はシークレット: wrangler secret put API_KEY
# ローカル dev 用のデフォルト値（本番では必ずシークレットを設定すること）
API_KEY = "dev"
