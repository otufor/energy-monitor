name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "apps/dashboard/**"
      - "packages/**"
  workflow_dispatch:

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version: 22
      - run: vp run dashboard#build
        env:
          VITE_WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/dashboard/dist --project-name=energy-monitor
