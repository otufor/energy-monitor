name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - "apps/dashboard/**"
      - "packages/**"
  workflow_dispatch:

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version: 22
      - run: vp run dashboard#build
        env:
          VITE_WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: energy-monitor
          directory: apps/dashboard/dist
