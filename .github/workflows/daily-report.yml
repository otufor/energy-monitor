name: Daily Energy Report

on:
  schedule:
    - cron: "0 21 * * *" # JST 毎朝6時 (UTC 21時)
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install marimo
        run: uv tool install marimo --with altair --with pandas --with requests

      - name: Run daily report notebook
        env:
          WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
        run: |
          marimo export html \
            notebooks/energy_analysis.py \
            -o notebooks/output/daily_$(date +%Y-%m-%d).html \
            --execute

      - name: Upload report to R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python scripts/upload_r2.py notebooks/output/daily_$(date +%Y-%m-%d).html

      - name: Notify LINE
        if: ${{ secrets.LINE_TOKEN != '' }}
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: |
          curl -X POST https://notify-api.line.me/api/notify \
            -H "Authorization: Bearer $LINE_TOKEN" \
            -d "message=📊 日次レポートが生成されました ($(date +%Y-%m-%d))"
