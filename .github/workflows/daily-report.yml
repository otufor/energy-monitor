name: Daily Energy Report

on:
  schedule:
    - cron: "0 21 * * *" # JST 毎朝6時 (UTC 21時)
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5

      - name: Install marimo
        run: uv tool install marimo --with altair --with pandas --with requests

      - name: Run daily report notebook
        env:
          WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
        run: |
          mkdir -p notebooks/output
          marimo export html \
            notebooks/energy_analysis.py \
            -o notebooks/output/daily_$(date +%Y-%m-%d).html

      - name: Upload report to R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -n "$R2_ENDPOINT" ]; then
            python scripts/upload_r2.py notebooks/output/daily_$(date +%Y-%m-%d).html
          else
            echo "R2_ENDPOINT not set, skipping upload"
          fi

      - name: Notify LINE
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: |
          if [ -n "$LINE_TOKEN" ]; then
            curl -s -o /dev/null -w "%{http_code}" \
              -X POST https://notify-api.line.me/api/notify \
              -H "Authorization: Bearer $LINE_TOKEN" \
              --data-urlencode "message=[energy-monitor] daily report generated ($(date +%Y-%m-%d))"
          fi
