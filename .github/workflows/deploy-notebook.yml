name: Deploy Notebook

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "notebooks/energy_analysis.py"
  workflow_dispatch:

jobs:
  deploy-notebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install marimo
        run: uv tool install marimo --with altair

      - name: Export WASM notebook
        run: |
          marimo export html-wasm notebooks/energy_analysis.py \
            -o notebooks/wasm \
            --include-cloudflare \
            --mode run \
            --force

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler@latest deploy --cwd notebooks
