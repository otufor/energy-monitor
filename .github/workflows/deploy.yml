name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-workers:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'apps/workers/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g vp
      - run: vp install
      - run: vp run workers#deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-dashboard:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'apps/dashboard/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g vp
      - run: vp install
      - run: vp build --filter dashboard
        env:
          VITE_WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: energy-monitor
          directory: apps/dashboard/dist
